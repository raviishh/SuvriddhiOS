name: CI

# this file runs automated tests to see if the React builds, along with other code auditing and formatting checks.
on:
    pull_request:
        branches:
            - main

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 22

            - name: Install dependencies
              run: |
                  cd src_phy
                  npm ci

            - name: Build
              run: |
                  cd src_phy
                  npm run build

            - name: Check vulnerabilities
              run: |
                  cd src_phy
                  npm audit --audit-level=high

            # If we decide to add tests later
            # - name: Run tests
            #   run: |
            #     cd src_phy
            #     npm test
