name: C++ Check

on:
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential libcivetweb-dev clang-format

            - name: Compile and check
              run: |
                  cd src_cs/backend
                  make clean
                  make all
